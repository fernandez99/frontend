<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MNIST Digit Classifier</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h1 {
            margin-bottom: 20px;
        }
        input[type="file"] {
            margin: 15px 0;
        }
        button {
            background: #4facfe;
            border: none;
            padding: 10px 20px;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background: #00c6ff;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
        img {
            margin-top: 10px;
            max-width: 150px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Digit Classifier</h1>

    <input type="file" id="imageInput" accept="image/*">
    <br>
    <button onclick="predict()">Predict</button>

    <div id="preview"></div>
    <div id="result"></div>
</div>

<script>
    const API_URL = "API_URL/predict";

    function predict() {
        const fileInput = document.getElementById("imageInput");
        const resultDiv = document.getElementById("result");
        const previewDiv = document.getElementById("preview");

        if (fileInput.files.length === 0) {
            alert("Please upload an image.");
            return;
        }

        const file = fileInput.files[0];

        // Show preview
        const reader = new FileReader();
        reader.onload = function(e) {
            previewDiv.innerHTML = `<img src="${e.target.result}" />`;
        };
        reader.readAsDataURL(file);

        const formData = new FormData();
        formData.append("file", file);

        resultDiv.innerHTML = "Predicting...";

        fetch(API_URL, {
            method: "POST",
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            resultDiv.innerHTML = "Prediction: " + data.prediction;
        })
        .catch(error => {
            resultDiv.innerHTML = "Error: " + error;
        });
    }
</script>

</body>
</html>
